<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low Poly Flight Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: none;
            z-index: 10;
        }
        #ui h1 { margin: 0 0 10px 0; font-size: 24px; color: #ffcc00;}
        .stat { font-size: 18px; margin-bottom: 5px; font-weight: bold; }
        
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            z-index: 10;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        #minimap-border {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            box-sizing: border-box;
        }
    </style>
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>LOW POLY FLIGHT</h1>
        <div class="stat">SCORE: <span id="score">0</span></div>
        <div class="stat" style="color: #ff4444;">BOOST: <span id="boost">0</span>%</div>
        <div class="stat">SPEED: <span id="speedDisplay">0</span></div>
    </div>

    <div id="controls-help">
        <b>Controls:</b><br>
        [Space] Throttle | [Shift] Boost<br>
        [W/S] Pitch | [A/D] Roll<br>
        [Q/E] Barrel Roll | [R] Immelman Turn<br>
        [Left Click] Shoot | [Right Click + Drag] Free Look
    </div>

    <div id="crosshair"></div>
    <div id="minimap-border"></div>

    <script>
        // --- Initialization ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 200, 3000);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 11, 18); // Initialize camera position above ground
        
        // Minimap Camera setup
        const mapSize = 200;
        const minimapCamera = new THREE.OrthographicCamera(-300, 300, 300, -300, 1, 2000);
        minimapCamera.position.y = 1000;
        minimapCamera.up.set(0, 0, -1); // Fix gimbal lock for top-down view
        minimapCamera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.autoClear = false; // Important for minimap rendering
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(500, 1000, 500);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -1000;
        dirLight.shadow.camera.right = 1000;
        dirLight.shadow.camera.top = 1000;
        dirLight.shadow.camera.bottom = -1000;
        dirLight.shadow.camera.far = 3000;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Environment ---
        const flatMaterial = (color) => new THREE.MeshLambertMaterial({ color: color, flatShading: true });

        // Infinite Ground
        const gridSize = 8000;
        const gridDivisions = 200; // 40 units per cell
        const groundGeo = new THREE.PlaneGeometry(gridSize, gridSize);
        const ground = new THREE.Mesh(groundGeo, flatMaterial(0x4CAF50));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid overlay
        const gridHelper = new THREE.GridHelper(gridSize, gridDivisions, 0x2E7D32, 0x2E7D32);
        gridHelper.position.y = 0.1;
        gridHelper.material.opacity = 0.5;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Airstrip
        const stripGeo = new THREE.PlaneGeometry(60, 600);
        const strip = new THREE.Mesh(stripGeo, flatMaterial(0x555555));
        strip.rotation.x = -Math.PI / 2;
        strip.position.set(0, 0.5, -200);
        strip.receiveShadow = true;
        scene.add(strip);

        // Airstrip lines
        for(let i=0; i<15; i++) {
            const line = new THREE.Mesh(new THREE.PlaneGeometry(2, 20), flatMaterial(0xFFEB3B));
            line.rotation.x = -Math.PI / 2;
            line.position.set(0, 0.6, -20 - (i * 40));
            scene.add(line);
        }

        // Decor (Trees & Buildings)
        const decorGroup = new THREE.Group();
        scene.add(decorGroup);

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 5, 5), flatMaterial(0x795548));
            trunk.position.y = 2.5;
            trunk.castShadow = true;
            tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.IcosahedronGeometry(4, 0), flatMaterial(0x2E7D32));
            leaves.position.y = 6;
            leaves.castShadow = true;
            tree.add(leaves);
            tree.position.set(x, 0, z);
            decorGroup.add(tree);
        }

        function createBuilding(x, z) {
            const width = 10 + Math.random() * 15;
            const height = 10 + Math.random() * 30;
            const depth = 10 + Math.random() * 15;
            const bldg = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), flatMaterial(0x90A4AE));
            bldg.position.set(x, height / 2, z);
            bldg.castShadow = true;
            bldg.receiveShadow = true;
            decorGroup.add(bldg);
        }

        // Scatter decor
        for(let i=0; i<300; i++) {
            const x = (Math.random() - 0.5) * 4000;
            const z = (Math.random() - 0.5) * 4000;
            // Keep runway clear
            if (Math.abs(x) < 100 && z < 100 && z > -800) continue;
            
            if (Math.random() > 0.3) createTree(x, z);
            else createBuilding(x, z);
        }

        // --- Player Plane (Arwing Style) ---
        const plane = new THREE.Group();
        
        // Central Fuselage
        const noseGeo = new THREE.ConeGeometry(0.8, 4, 4);
        noseGeo.rotateX(Math.PI / 2);
        const nose = new THREE.Mesh(noseGeo, flatMaterial(0xEEEEEE));
        nose.position.z = -2;
        nose.castShadow = true;
        plane.add(nose);

        const bodyGeo = new THREE.BoxGeometry(1.6, 1.2, 3);
        const body = new THREE.Mesh(bodyGeo, flatMaterial(0x1976D2));
        body.castShadow = true;
        plane.add(body);

        // Wings
        const wingGeo = new THREE.ConeGeometry(4, 1.5, 3);
        const wing = new THREE.Mesh(wingGeo, flatMaterial(0xEEEEEE));
        wing.scale.set(1, 0.1, 1.5);
        wing.position.set(0, 0, 0.5);
        wing.castShadow = true;
        plane.add(wing);

        // Engine Pods
        const podGeo = new THREE.BoxGeometry(0.8, 0.8, 2);
        const podMat = flatMaterial(0x1976D2);
        const leftPod = new THREE.Mesh(podGeo, podMat);
        leftPod.position.set(-2.5, -0.2, 1);
        leftPod.castShadow = true;
        plane.add(leftPod);
        const rightPod = new THREE.Mesh(podGeo, podMat);
        rightPod.position.set(2.5, -0.2, 1);
        rightPod.castShadow = true;
        plane.add(rightPod);

        // Engine Glow
        const glowGeo = new THREE.PlaneGeometry(0.6, 0.6);
        const glowMat = new THREE.MeshBasicMaterial({ color: 0x00FFFF, side: THREE.DoubleSide });
        const leftGlow = new THREE.Mesh(glowGeo, glowMat);
        leftGlow.position.set(-2.5, -0.2, 2.01);
        plane.add(leftGlow);
        const rightGlow = new THREE.Mesh(glowGeo, glowMat);
        rightGlow.position.set(2.5, -0.2, 2.01);
        plane.add(rightGlow);

        plane.position.set(0, 5, 0); // Start on airstrip
        scene.add(plane);

        // --- Gameplay Objects ---
        const rings = [];
        const targets = [];
        const lasers = [];
        
        const ringGeo = new THREE.TorusGeometry(15, 1.5, 8, 16);
        const ringMat = new THREE.MeshLambertMaterial({ color: 0xFFD700, emissive: 0x554400 });
        
        const targetGeo = new THREE.IcosahedronGeometry(4, 0);
        const targetMat = new THREE.MeshLambertMaterial({ color: 0xFF3333, flatShading: true });

        // Generate Obstacle Course
        let courseZ = -800;
        let courseX = 0;
        let courseY = 30;

        for(let i=0; i<100; i++) {
            courseZ -= 200 + Math.random() * 100;
            courseX += (Math.random() - 0.5) * 200;
            courseY += (Math.random() - 0.5) * 50;
            courseY = Math.max(15, Math.min(courseY, 200)); // keep in bounds

            // Add Ring
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(courseX, courseY, courseZ);
            ring.lookAt(courseX, courseY, courseZ + 10);
            scene.add(ring);
            rings.push({ mesh: ring, active: true });

            // Add Target nearby occasionally
            if (Math.random() > 0.4) {
                const target = new THREE.Mesh(targetGeo, targetMat);
                target.position.set(
                    courseX + (Math.random() - 0.5) * 80,
                    courseY + (Math.random() - 0.5) * 40,
                    courseZ + (Math.random() - 0.5) * 100
                );
                scene.add(target);
                targets.push({ mesh: target, active: true });
            }
        }

        // --- Variables & State ---
        let speed = 0;
        let maxSpeed = 3.0;
        let currentBoost = 0;
        let score = 0;
        let velocityY = 0; // Added for gravity
        
        const keys = { w: false, a: false, s: false, d: false, space: false, shift: false };
        let rightClickDown = false;
        let freeLookYaw = 0;
        let freeLookPitch = 0;
        
        let activeManeuver = null; // { type: 'rollLeft', progress: 0 }

        // --- Input Handling ---
        document.addEventListener('contextmenu', e => e.preventDefault());

        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = true;
            if (k === 's') keys.s = true;
            if (k === 'a') keys.a = true;
            if (k === 'd') keys.d = true;
            if (k === ' ') { keys.space = true; e.preventDefault(); }
            if (k === 'shift') keys.shift = true;

            // Maneuvers
            if (!activeManeuver) {
                if (k === 'q') activeManeuver = { type: 'rollLeft', progress: 0 };
                if (k === 'e') activeManeuver = { type: 'rollRight', progress: 0 };
                if (k === 'r') activeManeuver = { type: 'immelman', progress: 0 };
            }
        });

        document.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = false;
            if (k === 's') keys.s = false;
            if (k === 'a') keys.a = false;
            if (k === 'd') keys.d = false;
            if (k === ' ') keys.space = false;
            if (k === 'shift') keys.shift = false;
        });

        document.addEventListener('mousedown', e => {
            if (e.button === 2) {
                rightClickDown = true;
            } else if (e.button === 0) {
                shootLaser();
            }
        });

        document.addEventListener('mouseup', e => {
            if (e.button === 2) {
                rightClickDown = false;
            }
        });

        document.addEventListener('mousemove', e => {
            if (rightClickDown) {
                freeLookYaw -= e.movementX * 0.005;
                freeLookPitch -= e.movementY * 0.005;
                freeLookPitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, freeLookPitch));
            }
        });

        function shootLaser() {
            const laserGeo = new THREE.CylinderGeometry(0.2, 0.2, 10, 8);
            laserGeo.rotateX(Math.PI / 2);
            const laserMat = new THREE.MeshBasicMaterial({ color: 0x00FF00 });
            
            // Left laser
            const l1 = new THREE.Mesh(laserGeo, laserMat);
            l1.position.copy(plane.position);
            l1.translateX(-2.5); l1.translateY(-0.2); l1.translateZ(-1);
            l1.quaternion.copy(plane.quaternion);
            scene.add(l1);
            lasers.push({ mesh: l1, life: 60 });

            // Right laser
            const l2 = new THREE.Mesh(laserGeo, laserMat);
            l2.position.copy(plane.position);
            l2.translateX(2.5); l2.translateY(-0.2); l2.translateZ(-1);
            l2.quaternion.copy(plane.quaternion);
            scene.add(l2);
            lasers.push({ mesh: l2, life: 60 });
        }

        // --- UI Updates ---
        const scoreEl = document.getElementById('score');
        const boostEl = document.getElementById('boost');
        const speedEl = document.getElementById('speedDisplay');

        // --- Main Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Throttle & Speed Logic
            let targetSpeed = 0;
            if (keys.space) {
                targetSpeed = maxSpeed;
                if (keys.shift && currentBoost > 0) {
                    targetSpeed = maxSpeed * 2.5;
                    currentBoost -= 0.5; // Drain boost
                    leftGlow.material.color.setHex(0xFF4400); // Orange when boosting
                    rightGlow.material.color.setHex(0xFF4400);
                } else {
                    leftGlow.material.color.setHex(0x00FFFF); // Normal cyan
                    rightGlow.material.color.setHex(0x00FFFF);
                }
            } else {
                leftGlow.material.color.setHex(0x002244); // Dim when not pressing gas
                rightGlow.material.color.setHex(0x002244);
            }

            // Smooth speed transition
            speed += (targetSpeed - speed) * 0.05;
            
            // Calculate Lift and Gravity (Stalling)
            // If speed is 0, lift is 0, gravity is max (simulating stall/falling)
            // If speed >= 1.5, lift is 1 (no falling)
            const lift = Math.min(speed / 1.5, 1.0);
            const gravityForce = 0.15 * (1 - lift); 
            velocityY -= gravityForce;

            // Terminal downward velocity
            if (velocityY < -2.0) velocityY = -2.0;

            // Apply Movement
            plane.translateZ(-speed);      // Local forward movement
            plane.position.y += velocityY; // Global gravity

            // Ground Collision prevention
            if (plane.position.y < 2) {
                plane.position.y = 2;
                velocityY = Math.max(0, velocityY); // Reset downward velocity
                // Level out pitch slightly if hitting ground
                plane.rotation.x *= 0.9;
                
                // Add ground friction if not throttling
                if (!keys.space) speed *= 0.95; 
            }

            // 2. Flight Controls (Pitch & Roll)
            if (!activeManeuver) {
                // Return to level roll smoothly if no input
                if (!keys.a && !keys.d) {
                     plane.rotateZ(-plane.rotation.z * 0.05); 
                }

                if (speed > 0.1) {
                    // Increased turning speed and banking for tighter handling
                    const rotationSpeed = 0.035 * (Math.min(speed / maxSpeed, 1.5));
                    if (keys.w) plane.rotateX(-rotationSpeed); // Pitch down
                    if (keys.s) plane.rotateX(rotationSpeed);  // Pitch up
                    if (keys.a) { plane.rotateZ(rotationSpeed * 2.5); plane.rotateY(rotationSpeed * 1.2); } // Harder bank & yaw
                    if (keys.d) { plane.rotateZ(-rotationSpeed * 2.5); plane.rotateY(-rotationSpeed * 1.2); }
                }
            } else {
                // Handle Automated Maneuvers
                if (activeManeuver.type === 'rollLeft') {
                    plane.rotateZ(Math.PI * 2 / 30); // 360 deg over 30 frames
                    activeManeuver.progress += 1/30;
                } else if (activeManeuver.type === 'rollRight') {
                    plane.rotateZ(-Math.PI * 2 / 30);
                    activeManeuver.progress += 1/30;
                } else if (activeManeuver.type === 'immelman') {
                    // Immelman: Half loop (pitch up) then half roll
                    if (activeManeuver.progress < 0.5) {
                        plane.rotateX(Math.PI / 30); // 180 deg pitch over 30 frames
                    } else {
                        plane.rotateZ(Math.PI / 30); // 180 deg roll over 30 frames
                    }
                    activeManeuver.progress += 1/60;
                }

                if (activeManeuver.progress >= 1) {
                    activeManeuver = null; // End maneuver
                }
            }

            // 3. Update Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                const l = lasers[i];
                l.mesh.translateZ(-10); // Fast speed
                l.life--;
                
                // Check Collision with Targets
                for (let j = 0; j < targets.length; j++) {
                    const t = targets[j];
                    if (t.active && l.mesh.position.distanceTo(t.mesh.position) < 8) {
                        // Hit target
                        t.active = false;
                        scene.remove(t.mesh);
                        l.life = 0; // Destroy laser
                        currentBoost = Math.min(100, currentBoost + 25);
                        score += 50;
                        break;
                    }
                }

                if (l.life <= 0) {
                    scene.remove(l.mesh);
                    lasers.splice(i, 1);
                }
            }

            // 4. Update Game Objects (Rings)
            for (let i = 0; i < rings.length; i++) {
                const r = rings[i];
                if (r.active && plane.position.distanceTo(r.mesh.position) < 18) {
                    // Flew through ring
                    r.active = false;
                    r.mesh.material.color.setHex(0x00FF00); // Turn green
                    score += 100;
                }
                if (r.active) {
                    r.mesh.rotation.z += 0.01; // Spin rings slowly
                }
            }

            // Make targets spin
            for(let t of targets) {
                if(t.active) {
                    t.mesh.rotation.x += 0.02;
                    t.mesh.rotation.y += 0.02;
                }
            }

            // Infinite Environment Logic (Keep terrain, decor, rings moving with player)
            const snap = gridSize / gridDivisions;
            ground.position.x = Math.floor(plane.position.x / snap) * snap;
            ground.position.z = Math.floor(plane.position.z / snap) * snap;
            gridHelper.position.x = ground.position.x;
            gridHelper.position.z = ground.position.z;

            // Reposition Decor (Trees/Buildings) to create infinite forest/city
            for(let i=0; i<decorGroup.children.length; i++) {
                const obj = decorGroup.children[i];
                if (plane.position.x - obj.position.x > 2000) obj.position.x += 4000;
                if (plane.position.x - obj.position.x < -2000) obj.position.x -= 4000;
                if (plane.position.z - obj.position.z > 2000) obj.position.z += 4000;
                if (plane.position.z - obj.position.z < -2000) obj.position.z -= 4000;
            }

            // Reposition Rings & Targets to make infinite course
            for(let r of rings) {
                if (r.mesh.position.z > plane.position.z + 500) { // Passed far behind
                    r.mesh.position.z -= 4000;
                    r.mesh.position.x = plane.position.x + (Math.random() - 0.5) * 800;
                    r.active = true;
                    r.mesh.material.color.setHex(0xFFD700); // Reset color
                }
            }
            for(let t of targets) {
                if (t.mesh.position.z > plane.position.z + 500) {
                    t.mesh.position.z -= 4000;
                    t.mesh.position.x = plane.position.x + (Math.random() - 0.5) * 800;
                    t.mesh.position.y = Math.max(15, plane.position.y + (Math.random() - 0.5) * 100);
                    if (!t.active) {
                        t.active = true;
                        scene.add(t.mesh); // Re-add to scene if it was destroyed
                    }
                }
            }

            // 5. Camera Follow Logic
            if (!rightClickDown) {
                // Interpolate free look angles back to 0
                freeLookYaw += (0 - freeLookYaw) * 0.1;
                freeLookPitch += (0 - freeLookPitch) * 0.1;
            }

            // Calculate ideal camera position behind plane
            const offset = new THREE.Vector3(0, 6, 18);
            
            // Apply free look rotations to the offset
            const lookQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(freeLookPitch, freeLookYaw, 0, 'YXZ'));
            offset.applyQuaternion(lookQuat);
            
            // Apply plane's rotation to the offset
            offset.applyQuaternion(plane.quaternion);
            
            const targetCamPos = plane.position.clone().add(offset);
            camera.position.lerp(targetCamPos, 0.15); // Smooth follow

            // Calculate ideal look-at point
            const lookAtOffset = new THREE.Vector3(0, 0, -20);
            lookAtOffset.applyQuaternion(lookQuat);
            lookAtOffset.applyQuaternion(plane.quaternion);
            const targetLookAt = plane.position.clone().add(lookAtOffset);
            
            camera.lookAt(targetLookAt);

            // 6. UI Updates
            scoreEl.innerText = score;
            boostEl.innerText = Math.floor(currentBoost);
            speedEl.innerText = Math.floor(speed * 100);

            // 7. Rendering
            renderer.clear();
            
            // Render main scene
            renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
            renderer.render(scene, camera);

            // Render Minimap
            renderer.clearDepth(); // Prevents minimap objects from failing depth test
            
            minimapCamera.position.x = plane.position.x;
            minimapCamera.position.z = plane.position.z;
            minimapCamera.lookAt(plane.position.x, 0, plane.position.z);
            
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // Use Scissor Test to prevent the minimap background from clearing the whole screen
            renderer.setScissorTest(true);
            renderer.setScissor(w - 220, 20, 200, 200);
            renderer.setViewport(w - 220, 20, 200, 200); 
            renderer.render(scene, minimapCamera);
            renderer.setScissorTest(false);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        animate();
    </script>
</body>
</html>
